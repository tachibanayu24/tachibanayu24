<!doctype html>
<!--
  Do NOT edit index.html or en/index.html directly — they are generated.
  Edit this template (index.template.html), then run:
  node scripts/generate-docs.js
-->
<html lang="{{HTML_LANG}}" data-prerendered>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" id="theme-color" content="#e8eef3" />
    <!-- PWA / Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      id="apple-status-bar"
      content="default"
    />
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <meta name="author" content="Yuto Tachibana, 立花 優斗" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{CANONICAL}}" />
    <link rel="alternate" hreflang="ja" href="https://tachibanayu24.com/" />
    <link rel="alternate" hreflang="en" href="https://tachibanayu24.com/en/" />
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://tachibanayu24.com/"
    />

    <!-- SEO & Crawlability -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link
      rel="alternate"
      type="text/plain"
      href="/llms.txt"
      title="LLM-friendly site information"
    />
    <link
      rel="alternate"
      type="application/json"
      href="/me.json"
      title="Profile data (JSON)"
    />

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>🐰</text></svg>"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="profile" />
    <meta property="profile:first_name" content="Yuto" />
    <meta property="profile:last_name" content="Tachibana" />
    <meta property="profile:username" content="tachibanayu24" />
    <meta property="og:url" content="{{CANONICAL}}" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta
      property="og:image"
      content="https://tachibanayu24.com/images/me.jpg"
    />
    <meta property="og:locale" content="{{OG_LOCALE}}" />
    <meta property="og:locale:alternate" content="{{OG_LOCALE_ALT}}" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@tachibanayu24" />
    <meta name="twitter:creator" content="@tachibanayu24" />
    <meta name="twitter:title" content="{{TITLE}}" />
    <meta name="twitter:description" content="{{DESCRIPTION}}" />
    <meta
      name="twitter:image"
      content="https://tachibanayu24.com/images/me.jpg"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {{JSONLD}}
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="/styles/index.css" />

    <!-- Dynamic Background System -->
    <script type="module" src="/background/index.js"></script>

    <script type="module">
      // Only load the debug panel when explicitly requested via #debug, so
      // normal visitors don't pay the fetch/parse cost.
      if (location.hash === "#debug") import("/background/debug.js");
    </script>
  </head>
  <body>
    <div class="container">
      <div class="card-container">
        <div class="card">
          <!-- Front Side -->
          <div class="card-face card-front">
            <div class="shimmer-effect"></div>
            <div class="fresnel-effect"></div>
            <button
              class="card-action-btn lang-toggle"
              id="lang-toggle"
              aria-label="{{LANG_TOGGLE_ARIA}}"
            >
              {{LANG_TOGGLE_LABEL}}
            </button>
            <a
              class="card-action-btn view-json-btn"
              href="/me.json"
              target="_blank"
              rel="noopener"
              aria-label="{{VIEW_JSON_ARIA}}"
            >
              <svg
                role="img"
                viewBox="0 -960 960 960"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <title>JSON</title>
                <path
                  d="M560-160v-80h120q17 0 28.5-11.5T720-280v-80q0-38 22-69t58-44v-14q-36-13-58-44t-22-69v-80q0-17-11.5-28.5T680-720H560v-80h120q50 0 85 35t35 85v80q0 17 11.5 28.5T840-560h40v160h-40q-17 0-28.5 11.5T800-360v80q0 50-35 85t-85 35H560Zm-280 0q-50 0-85-35t-35-85v-80q0-17-11.5-28.5T120-400H80v-160h40q17 0 28.5-11.5T160-600v-80q0-50 35-85t85-35h120v80H280q-17 0-28.5 11.5T240-680v80q0 38-22 69t-58 44v14q36 13 58 44t22 69v80q0 17 11.5 28.5T280-240h120v80H280Z"
                />
              </svg>
            </a>
            <div class="profile">
              <div class="avatar-wrapper">
                <img
                  src="/images/me.jpg"
                  alt="Yuto Tachibana (立花 優斗)"
                  class="avatar"
                />
              </div>
              <h1 class="name" id="name">{{NAME}}</h1>
              <p class="role text-engraved" id="role">{{ROLE}}</p>
              <div class="company text-engraved" id="company">
                {{COMPANY_HTML}}
              </div>
              <div class="bio text-engraved" id="bio">{{BIO_HTML}}</div>
            </div>
            <div class="divider"></div>
            <p class="links-title text-engraved">{{CONNECT_LABEL}}</p>
            <div class="links-grid" id="links">{{LINKS_HTML}}</div>
          </div>

          <!-- Back Side -->
          <div class="card-face card-back">
            <div class="shimmer-effect"></div>
            <div class="fresnel-effect"></div>
            <button
              class="card-action-btn lang-toggle"
              id="lang-toggle-back"
              aria-label="{{LANG_TOGGLE_ARIA}}"
            >
              {{LANG_TOGGLE_LABEL}}
            </button>
            <a
              class="card-action-btn view-json-btn"
              href="/me.json"
              target="_blank"
              rel="noopener"
              aria-label="{{VIEW_JSON_ARIA}}"
            >
              <svg
                role="img"
                viewBox="0 -960 960 960"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <title>JSON</title>
                <path
                  d="M560-160v-80h120q17 0 28.5-11.5T720-280v-80q0-38 22-69t58-44v-14q-36-13-58-44t-22-69v-80q0-17-11.5-28.5T680-720H560v-80h120q50 0 85 35t35 85v80q0 17 11.5 28.5T840-560h40v160h-40q-17 0-28.5 11.5T800-360v80q0 50-35 85t-85 35H560Zm-280 0q-50 0-85-35t-35-85v-80q0-17-11.5-28.5T120-400H80v-160h40q17 0 28.5-11.5T160-600v-80q0-50 35-85t85-35h120v80H280q-17 0-28.5 11.5T240-680v80q0 38-22 69t-58 44v14q36 13 58 44t22 69v80q0 17 11.5 28.5T280-240h120v80H280Z"
                />
              </svg>
            </a>

            <div class="profile">
              <div class="avatar-wrapper">
                <img
                  src="/images/hokori.jpg"
                  alt="{{BACK_AVATAR_ALT}}"
                  class="avatar"
                />
              </div>
              <p class="name" id="name-back">{{NAME}}</p>
              <p class="role text-engraved" id="role-back">{{ROLE}}</p>
              <div class="company text-engraved" id="company-back">
                {{COMPANY_HTML}}
              </div>
            </div>

            <div class="back-section">
              <h2 class="back-section-title text-engraved" id="about-label">
                {{ABOUT_LABEL}}
              </h2>
              <p class="back-section-content text-engraved" id="about-content">
                {{ABOUT_CONTENT}}
              </p>
            </div>

            <div class="back-section">
              <h2 class="back-section-title text-engraved" id="favorites-label">
                {{FAVORITES_LABEL}}
              </h2>
              <div class="favorites-list" id="favorites-list">
                {{FAVORITES_LIST_HTML}}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/profile/index.js"></script>
    <script type="module" src="/card-effects.js"></script>
  </body>
</html>
