name: Generate documentation from me.json

on:
  push:
    branches:
      - main
    paths:
      - "me.json"
      - "index.template.html"
      - "profile/templates.js"
      - "profile/icons.js"
      - "scripts/generate-docs.js"
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so lastmod can use the me.json commit date

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate documentation
        run: node scripts/generate-docs.js

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet README.md README.ja.md llms.txt index.html en/index.html sitemap.xml 2>/dev/null || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.ja.md llms.txt index.html en/index.html sitemap.xml
          git commit -m "docs: auto-generate site (HTML, README, llms.txt, sitemap) from me.json"
          git push
